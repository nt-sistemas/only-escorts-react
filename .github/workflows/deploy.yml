name: Deploy Front (Static)

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - package.json
      - package-lock.json
      - vite.config.ts
      - tsconfig.json
      - .github/workflows/deploy.yml
  workflow_dispatch:

concurrency:
  group: deploy-front-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build front
        run: npm run build

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            FRONT_PATH="/var/www/only-escorts-intim/front"

            if [ -z "$FRONT_PATH" ]; then
              echo "FRONT_PATH secret is required."
              exit 1
            fi



            mkdir -p "$FRONT_PATH"
            rm -rf "$FRONT_PATH"/*

            cd "$FRONT_PATH"
            # Create a simple index.html to serve as a placeholder until the files are uploaded
            echo "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Only Escorts Intim</title></head><body><h1>Deploying...</h1></body></html>" > index.html

      - name: Upload static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: dist/*
          target: ${{ secrets.FRONT_PATH }}
          strip_components: 1
